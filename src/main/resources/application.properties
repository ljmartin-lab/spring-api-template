# ============================================================
# Base application properties
# Profile-specific files override these values:
#   application-local.properties  (local dev)
#   application-prod.properties   (AWS production)
#   application-test.properties   (test suite)
# ============================================================

spring.application.name=template-api

# Active profile must be set explicitly via:
#   -Dspring.profiles.active=local   (local dev)
#   -Dspring.profiles.active=prod    (production)
spring.profiles.default=local

# ============================================================
# Vault (base config - overridden per profile)
# ============================================================
spring.cloud.vault.enabled=false
spring.config.import=optional:vault:
spring.cloud.vault.uri=http://localhost:8200
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:dev-token}

# ============================================================
# Actuator base config
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ============================================================
# SpringDoc / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true