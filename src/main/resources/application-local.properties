# ============================================================
# Local development properties
# Used when running with -Dspring.profiles.active=local
# or by default when no profile is set
# ============================================================

spring.application.name=template-api

# ============================================================
# DataSource - local dockerised Postgres
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/template_api
spring.datasource.username=template_user
spring.datasource.password=template_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.pool-name=TemplateApiPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ============================================================
# Vault (disabled locally - secrets provided directly above)
# ============================================================
spring.cloud.vault.enabled=false
spring.config.import=optional:vault:

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.template=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.jdbc=DEBUG