services:
  postgres:
    image: postgres:17-alpine
    container_name: template-api-postgres
    environment:
      POSTGRES_DB: template_api
      POSTGRES_USER: template_user
      POSTGRES_PASSWORD: template_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U template_user -d template_api" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local